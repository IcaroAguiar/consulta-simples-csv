appId: com.icaroaguiar.consulta-simples-csv
productName: Consulta Simples CSV
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
asar: true
asarUnpack:
  - "node_modules/.pnpm/playwright-core@*/node_modules/playwright-core/**/*"
extraResources:
  - from: "node_modules/.pnpm/playwright-core@1.58.2/node_modules/playwright-core/.local-browsers"
    to: "browsers"
    filter:
      - "**/*"
mac:
  target:
    - dmg
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
