name: Windows EXE unsigned

concurrency:
  group: windows-exe-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Package Windows
        run: pnpm dist:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: consulta-simples-csv-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Publish rolling unsigned release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-unsigned-latest
          name: Windows unsigned (latest)
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Build contínuo mais recente do instalador Windows unsigned.

            Use este pacote para testes internos e validação manual.
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
